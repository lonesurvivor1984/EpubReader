schema: spec-driven

context: |
  Tech stack: Python, PySide6 (Qt6), QtWebEngine (Chromium), lxml
  Architecture: layered — CLI → Application → Domain → Infrastructure → UI
  Domain models are pure Python (no framework dependencies)
  Data persistence: JSON files with atomic writes
  EPUB resources served via embedded local HTTP server (not temp files)
  Target: cross-platform desktop app, launched from command line
  Publishing: PyInstaller → native installer (Inno Setup / dmg / AppImage)

